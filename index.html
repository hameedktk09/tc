<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Credits Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- mammoth.js for DOCX reading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <!-- PDF.js for PDF reading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        /* --- STYLES --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f4f7fc; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { max-width: 1100px; width: 100%; background: white; border-radius: 32px; box-shadow: 0 20px 40px -12px rgba(0,20,40,0.25); padding: 30px 35px; transition: 0.2s; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eef2f7; padding-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .logo-area { display: flex; align-items: center; gap: 18px; }
        .logo-placeholder { width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .logo-placeholder img { width: 100%; height: 100%; object-fit: contain; }
        .uni-name { font-weight: 700; font-size: 1.3rem; color: #0b2b4a; letter-spacing: -0.3px; line-height: 1.1; }
        .uni-sub { font-weight: 400; font-size: 0.85rem; color: #1f4b77; display: block; letter-spacing: -0.1px; }
        .badge { background: #eef3fa; padding: 6px 14px; border-radius: 40px; font-size: 0.75rem; color: #1f3a5f; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .scan-area { background: #f9faff; border-radius: 24px; padding: 20px 22px; margin: 20px 0 15px 0; border: 1px dashed #b7c9e2; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; }
        .folder-input-group { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; flex: 1; }
        .folder-input-group input { 
            flex: 1; 
            min-width: 250px; 
            padding: 10px 16px; 
            border: 1px solid #d6e0ed; 
            border-radius: 60px; 
            font-size: 0.9rem; 
            background: #f5f8fc; 
            color: #5c7390;
            cursor: default;
            user-select: none;
        }
        .folder-input-group input:focus { outline: none; border-color: #0b2b4a; }
        .auto-scan-btn { background: #0b2b4a; color: white; border: none; padding: 10px 22px; border-radius: 60px; font-weight: 600; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.15s; box-shadow: 0 4px 10px rgba(11,43,74,0.15); }
        .auto-scan-btn:hover { background: #1e3f62; transform: scale(1.01); }
        .auto-scan-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .search-section { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; background: white; padding: 3px 6px 3px 14px; border-radius: 60px; border: 1px solid #d6e0ed; }
        .search-section input { border: none; padding: 6px 4px; font-size: 0.9rem; min-width: 130px; outline: none; background: transparent; }
        .search-section button { background: #eef3fa; border: none; padding: 5px 14px; border-radius: 40px; font-weight: 500; color: #1f3a5f; cursor: pointer; transition: 0.1s; font-size: 0.85rem; }
        .search-section button:hover { background: #dce5f0; }
        .report-container { background: #ffffff; border-radius: 20px; padding: 8px 0 4px 0; }
        .report-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; flex-wrap: wrap; }
        .report-header h2 { font-weight: 600; font-size: 1.2rem; color: #0b1f33; display: flex; align-items: center; gap: 8px; }
        .report-header h2 i { color: #2b6c9e; }
        .record-count { background: #dce5f0; padding: 3px 14px; border-radius: 30px; font-size: 0.75rem; font-weight: 500; color: #1e3d60; }
        .report-list { background: #f8faff; border-radius: 16px; padding: 8px 0; min-height: 100px; border: 1px solid #e4ebf5; overflow-x: auto; }
        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Times New Roman', Times, serif;
            font-size: 11pt;
        }
        .report-table th {
            background: #0b2b4a;
            color: white;
            padding: 8px 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #0b2b4a;
            white-space: nowrap;
            font-size: 11pt;
        }
        .report-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #e6edf6;
            vertical-align: middle;
            font-size: 11pt;
        }
        .report-table tr:hover td {
            background: #f0f6ff;
        }
        .report-table .file-name-col {
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 8pt;
            color: #7a8fa5;
        }
        .report-table .sno-col {
            color: #5c7390;
            font-weight: 500;
            text-align: center;
            width: 40px;
            white-space: nowrap;
        }
        .empty-message, .not-found-message { 
            font-family: 'Times New Roman', Times, serif;
            font-size: 11pt;
            color: #5c7390; 
            padding: 25px 20px; 
            text-align: center; 
            font-style: italic; 
        }
        .not-found-message { background: #fff6f0; border-radius: 16px; border: 1px solid #ffe4d6; }
        .action-btn { 
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0b2b4a; 
            color: white; 
            border: none; 
            padding: 6px 18px; 
            border-radius: 40px; 
            font-weight: 500; 
            cursor: pointer; 
            transition: 0.1s; 
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
            margin: 4px; 
            font-size: 0.85rem;
        }
        .action-btn:hover { background: #1e3f62; }
        .action-btn i { font-size: 0.85rem; }
        .file-status { font-size: 0.75rem; color: #2f6b9e; background: #eaf1fb; padding: 3px 12px; border-radius: 30px; font-family: 'Segoe UI', Arial, sans-serif; }
        .footer-note { margin-top: 15px; font-size: 0.75rem; color: #4c6990; text-align: right; border-top: 1px solid #e2ebf5; padding-top: 12px; display: flex; justify-content: space-between; flex-wrap: wrap; font-family: 'Segoe UI', Arial, sans-serif; }
        .sample-logo { display: flex; align-items: center; gap: 5px; }
        .sample-logo i { font-size: 1.1rem; color: #1f4b77; }
        .action-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-top: 12px; }
        .progress-bar { width: 100%; height: 3px; background: #e0e7ef; border-radius: 3px; margin: 6px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: #0b2b4a; width: 0%; transition: width 0.3s; border-radius: 3px; }
        .download-btn { background: #1a764a; }
        .download-btn:hover { background: #145d3a; }
        .folder-icon { color: #0b2b4a; font-size: 1rem; }
        .sort-indicator { font-size: 0.7rem; margin-left: 4px; color: #8aa9c9; }
        .file-type-badge { 
            font-size: 0.6rem; 
            background: #dce5f0; 
            color: #1f3a5f; 
            padding: 1px 6px; 
            border-radius: 10px; 
            margin-left: 4px;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        @media (max-width: 700px) { 
            .card { padding: 16px 18px; } 
            .scan-area { flex-direction: column; align-items: stretch; padding: 16px; } 
            .folder-input-group input { min-width: auto; } 
            .search-section { border-radius: 30px; padding: 4px 8px; } 
            .logo-placeholder { width: 100px; height: 100px; } 
            .uni-name { font-size: 1rem; } 
            .uni-sub { font-size: 0.7rem; }
            .report-table { font-size: 9pt; }
            .report-table th, .report-table td { padding: 6px 8px; }
        }
    </style>
</head>
<body>
<div class="card">
    <!-- HEADER -->
    <div class="header">
        <div class="logo-area">
            <div class="logo-placeholder">
                <img src="https://raw.githubusercontent.com/hameedktk09/tc-tracker/main/asulogo.png" alt="A'Sharqiyah University Logo">
            </div>
            <div>
                <span class="uni-name">A'Sharqiyah University</span>
                <span class="uni-sub">Center For Language and Foundation Studies</span>
            </div>
        </div>
        <div class="badge"><i class="fas fa-file-alt"></i> Transfer Credits Tracker</div>
    </div>

    <!-- SCAN AREA -->
    <div class="scan-area">
        <div class="folder-input-group">
            <i class="fas fa-folder folder-icon"></i>
            <input type="text" id="folderPath" placeholder="Select folder to scan..." readonly>
            <button class="auto-scan-btn" id="autoScanBtn"><i class="fas fa-play"></i> Auto-Scan</button>
            <span class="file-status" id="fileStatus">📂 Ready</span>
        </div>
        <div class="search-section">
            <i class="fas fa-user-graduate" style="color: #5c7a9a; font-size: 0.85rem;"></i>
            <input type="text" id="searchInput" placeholder="Search Name or ID...">
            <button id="searchBtn"><i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <!-- PROGRESS BAR -->
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <!-- REPORT -->
    <div class="report-container">
        <div class="report-header">
            <h2><i class="fas fa-list-ul"></i> Transfer Credit Report <span class="sort-indicator">↓ Newest first</span></h2>
            <span class="record-count" id="recordCount">0 records</span>
        </div>
        <div class="report-list" id="reportList">
            <div class="empty-message"><i class="fas fa-folder-open" style="margin-right: 8px;"></i> Click "Auto-Scan" to scan the folder for TC documents.</div>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer-note">
        <div class="sample-logo"><i class="fas fa-user-tie"></i> <span style="font-weight: 500;">Center Director: Dr. Waleed Al Harthy</span></div>
        <div><i class="fas fa-check-circle" style="color: #1a764a;"></i> <span style="font-weight: 400;">Admissions & Registration</span></div>
    </div>
</div>

<script>
    (function() {
        // DOM refs
        const reportList = document.getElementById('reportList');
        const recordCount = document.getElementById('recordCount');
        const folderPath = document.getElementById('folderPath');
        const autoScanBtn = document.getElementById('autoScanBtn');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const fileStatus = document.getElementById('fileStatus');
        const progressFill = document.getElementById('progressFill');

        // --- CONFIGURATION ---
        const FORM_TEMPLATE_URL = "https://raw.githubusercontent.com/hameedktk09/tc-tracker/main/TC-form.docx";
        const LOGO_URL = "https://raw.githubusercontent.com/hameedktk09/tc-tracker/main/asulogo.png";
        const PROVIDER_NAME = "Dr. Waleed Al Harthy";

        // Set PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // Update the logo dynamically
        document.querySelector('.logo-placeholder img').src = LOGO_URL;

        let allRecords = [];
        let isScanning = false;
        let folderHandle = null;
        let folderPermissionGranted = false;
        let lastSearchedId = "";

        // ---------- PARSE DATE TO COMPARE ----------
        function parseDate(dateStr) {
            if (!dateStr) return new Date(0);
            const parts = dateStr.split('-');
            if (parts.length === 3) {
                const day = parseInt(parts[0], 10);
                const month = parseInt(parts[1], 10) - 1;
                const year = parseInt(parts[2], 10);
                if (!isNaN(day) && !isNaN(month) && !isNaN(year)) {
                    return new Date(year, month, day);
                }
            }
            return new Date(0);
        }

        // ---------- EXTRACT STUDENT NAME ----------
        function extractStudentName(text) {
            // Try to find "Student Name:" pattern first
            let match = text.match(/Student\s*Name\s*[:：]\s*([^\n\r,]+)/i);
            if (match && match[1]) {
                let name = match[1].trim().replace(/\s{2,}/g, ' ');
                name = name.replace(/\s+(Application|Date|Submission|Student|ID|Degree).*$/i, '').trim();
                if (name.length > 2 && /^[A-Za-z\s\.]+$/.test(name)) {
                    return name;
                }
            }
            
            // Try "Name:" pattern
            match = text.match(/Name\s*[:：]\s*([^\n\r,]+)/i);
            if (match && match[1]) {
                let name = match[1].trim().replace(/\s{2,}/g, ' ');
                name = name.replace(/\s+(Application|Date|Submission|Student|ID|Degree).*$/i, '').trim();
                if (name.length > 3 && /^[A-Za-z\s\.]+$/.test(name)) {
                    return name;
                }
            }
            
            // Look for a name at the very beginning of the document
            const lines = text.split(/[\n\.]/);
            for (let i = 0; i < Math.min(5, lines.length); i++) {
                const line = lines[i].trim();
                if (line.length > 3 && /^[A-Za-z\s\.]+$/.test(line)) {
                    const excludeWords = ['Student', 'Name', 'Application', 'Submission', 'Date', 'Degree', 'Major', 'GPA', 'University', 'College', 'Course', 'Credits', 'Grade', 'Total', 'Percentage', 'Program', 'Head', 'Department', 'Dean', 'Director', 'Approval', 'Admissions', 'Registration'];
                    let isExcluded = false;
                    for (const word of excludeWords) {
                        if (line.match(new RegExp(word, 'i'))) {
                            isExcluded = true;
                            break;
                        }
                    }
                    if (!isExcluded) {
                        return line;
                    }
                }
            }
            
            // Look for a name after "Student" keyword
            const studentIndex = text.search(/\bStudent\b/i);
            if (studentIndex !== -1) {
                const afterStudent = text.substring(studentIndex + 7);
                const nameMatch = afterStudent.match(/^[^,.\n]*/);
                if (nameMatch) {
                    let name = nameMatch[0].trim();
                    name = name.replace(/\s+(Application|Date|Submission|ID|Degree).*$/i, '').trim();
                    if (name.length > 3 && /^[A-Za-z\s\.]+$/.test(name)) {
                        return name;
                    }
                }
            }
            
            return "Unknown Student";
        }

        // ---------- EXTRACT DATE ----------
        function extractDateFromText(text) {
            // Look for DATE in HEAD OF DEPARTMENT section
            const headDeptMatch = text.match(/HEAD\s*OF\s*DEPARTMENT[^\n]*\n[^\n]*DATE\s*[:：]\s*([^\n\r,]+)/i);
            if (headDeptMatch && headDeptMatch[1]) {
                const dateStr = headDeptMatch[1].trim();
                const formatted = formatDate(dateStr);
                if (formatted) return formatted;
            }
            
            // Look for DATE in COLLEGE DEAN section
            const deanMatch = text.match(/COLLEGE\s*DEAN[^\n]*\n[^\n]*DATE\s*[:：]\s*([^\n\r,]+)/i);
            if (deanMatch && deanMatch[1]) {
                const dateStr = deanMatch[1].trim();
                const formatted = formatDate(dateStr);
                if (formatted) return formatted;
            }
            
            // Look for DATE in NAME / SIGNATURE section
            const signatureMatch = text.match(/NAME\s*\/\s*SIGNATURE[^\n]*\n[^\n]*DATE\s*[:：]\s*([^\n\r,]+)/i);
            if (signatureMatch && signatureMatch[1]) {
                const dateStr = signatureMatch[1].trim();
                const formatted = formatDate(dateStr);
                if (formatted) return formatted;
            }
            
            // Look for any DATE label
            const dateLabelMatch = text.match(/DATE\s*[:：]\s*([^\n\r,]+)/i);
            if (dateLabelMatch && dateLabelMatch[1]) {
                const dateStr = dateLabelMatch[1].trim();
                const formatted = formatDate(dateStr);
                if (formatted) return formatted;
            }
            
            // Fallback: look for any date pattern
            const fallbackPatterns = [
                /\b(\d{1,2})\s+(January|February|March|April|May|June|July|August|September|October|November|December)\s+(\d{4})\b/i,
                /\b(\d{2})[-/](\d{2})[-/](\d{4})\b/,
            ];
            for (const pattern of fallbackPatterns) {
                const match = text.match(pattern);
                if (match) {
                    const formatted = formatDate(match[0]);
                    if (formatted) return formatted;
                }
            }
            
            const today = new Date();
            const d = String(today.getDate()).padStart(2, '0');
            const m = String(today.getMonth() + 1).padStart(2, '0');
            const y = today.getFullYear();
            return `${d}-${m}-${y}`;
        }

        // ---------- FORMAT DATE TO DD-MM-YYYY ----------
        function formatDate(dateStr) {
            if (!dateStr) return null;
            dateStr = dateStr.trim().replace(/,/g, '');
            
            const monthNames = {
                'january': '01', 'february': '02', 'march': '03', 'april': '04',
                'may': '05', 'june': '06', 'july': '07', 'august': '08',
                'september': '09', 'october': '10', 'november': '11', 'december': '12'
            };
            
            // Try DD Month YYYY
            let match = dateStr.match(/(\d{1,2})\s+(January|February|March|April|May|June|July|August|September|October|November|December)\s+(\d{4})/i);
            if (match) {
                const day = match[1].padStart(2, '0');
                const month = monthNames[match[2].toLowerCase()];
                const year = match[3];
                return `${day}-${month}-${year}`;
            }
            
            // Try DD-MM-YYYY or DD/MM/YYYY
            match = dateStr.match(/(\d{2})[-/](\d{2})[-/](\d{4})/);
            if (match) {
                return `${match[1]}-${match[2]}-${match[3]}`;
            }
            
            // Try DD-MM-YY or DD/MM-YY
            match = dateStr.match(/(\d{2})[-/](\d{2})[-/](\d{2})/);
            if (match) {
                const year = (parseInt(match[3]) > 30) ? `19${match[3]}` : `20${match[3]}`;
                return `${match[1]}-${match[2]}-${year}`;
            }
            
            return null;
        }

        // ---------- EXTRACT DATA FROM DOCX FILE ----------
        async function extractFromDocx(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        const arrayBuffer = e.target.result;
                        const result = await mammoth.extractRawText({ arrayBuffer });
                        const text = result.value;
                        resolve({
                            studentName: extractStudentName(text),
                            date: extractDateFromText(text)
                        });
                    } catch (error) {
                        console.error("Error parsing DOCX:", error);
                        resolve(null);
                    }
                };
                reader.onerror = function() {
                    console.error("FileReader error for DOCX");
                    resolve(null);
                };
                reader.readAsArrayBuffer(file);
            });
        }

        // ---------- EXTRACT DATA FROM PDF FILE ----------
        async function extractFromPdf(file) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                
                let fullText = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += pageText + '\n';
                }
                
                return {
                    studentName: extractStudentName(fullText),
                    date: extractDateFromText(fullText)
                };
            } catch (error) {
                console.error("Error parsing PDF:", error);
                return null;
            }
        }

        // ---------- EXTRACT DATA FROM FILE ----------
        async function extractRecordsFromFile(file) {
            return new Promise((resolve) => {
                const nameMatch = file.name.match(/^TC-(\d{6,8})\.(docx|pdf)$/i);
                if (!nameMatch) {
                    resolve(null);
                    return;
                }

                const studentIdFromFilename = nameMatch[1];
                const fileExt = nameMatch[2].toLowerCase();
                
                let extractPromise;
                if (fileExt === 'docx') {
                    extractPromise = extractFromDocx(file);
                } else if (fileExt === 'pdf') {
                    extractPromise = extractFromPdf(file);
                } else {
                    resolve(null);
                    return;
                }
                
                extractPromise.then(result => {
                    if (result) {
                        resolve({
                            studentName: result.studentName,
                            studentId: studentIdFromFilename,
                            date: result.date,
                            issuer: PROVIDER_NAME,
                            fileName: file.name
                        });
                    } else {
                        resolve({
                            studentName: "Unknown (Extraction failed)",
                            studentId: studentIdFromFilename,
                            date: new Date().toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '-'),
                            issuer: PROVIDER_NAME,
                            fileName: file.name
                        });
                    }
                }).catch(error => {
                    console.error("Extraction error:", error);
                    resolve(null);
                });
            });
        }

        // ---------- DOWNLOAD FORM ----------
        function downloadFormWithName(studentId) {
            if (!studentId || studentId === "ID") {
                alert('Please enter a valid Student ID (6-8 digits) first.');
                return;
            }

            fetch(FORM_TEMPLATE_URL)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to fetch template: ' + response.status);
                    }
                    return response.blob();
                })
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `TC-${studentId}.docx`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(url);
                    
                    fileStatus.textContent = `✅ Downloaded as TC-${studentId}.docx`;
                    fileStatus.style.background = "#e6f5e6";
                })
                .catch(error => {
                    console.error('Download error:', error);
                    alert('Could not download the template. Please check the URL and try again.');
                });
        }

        // ---------- SCAN FOLDER ----------
        async function scanFolderWithPermission() {
            if (isScanning) return;
            
            try {
                if (folderHandle && folderPermissionGranted) {
                    await scanFolderHandle(folderHandle);
                    return;
                }
                
                folderHandle = await window.showDirectoryPicker();
                const permission = await folderHandle.requestPermission({ mode: 'read' });
                if (permission !== 'granted') {
                    fileStatus.textContent = '⚠️ Permission denied';
                    fileStatus.style.background = "#fff3d6";
                    return;
                }
                
                folderPermissionGranted = true;
                folderPath.value = '📁 Folder selected';
                folderPath.style.color = '#0b2b4a';
                await scanFolderHandle(folderHandle);
                
            } catch (error) {
                if (error.name !== 'AbortError' && error.name !== 'SecurityError') {
                    console.error("Error accessing folder:", error);
                    fileStatus.textContent = `⚠️ ${error.message}`;
                    fileStatus.style.background = "#fff3d6";
                } else {
                    fileStatus.textContent = `📂 Cancelled`;
                    fileStatus.style.background = "#eaf1fb";
                }
            }
        }

        // ---------- SCAN FOLDER HANDLE ----------
        async function scanFolderHandle(handle) {
            fileStatus.textContent = `⏳ Scanning...`;
            fileStatus.style.background = "#fff3d6";
            autoScanBtn.disabled = true;
            isScanning = true;
            progressFill.style.width = '0%';
            
            const entries = [];
            for await (const entry of handle.values()) {
                if (entry.kind === 'file') {
                    entries.push(entry);
                }
            }
            
            const tcFiles = entries.filter(entry => {
                return entry.name.match(/^TC-\d{6,8}\.(docx|pdf)$/i);
            });
            
            if (tcFiles.length === 0) {
                fileStatus.textContent = `⚠️ No TC files found (looking for TC-{ID}.docx or .pdf)`;
                fileStatus.style.background = "#fff3d6";
                autoScanBtn.disabled = false;
                isScanning = false;
                progressFill.style.width = '100%';
                return;
            }
            
            fileStatus.textContent = `⏳ Processing ${tcFiles.length} files...`;
            
            const idMap = new Map();
            let processed = 0;
            
            for (const entry of tcFiles) {
                try {
                    const file = await entry.getFile();
                    const record = await extractRecordsFromFile(file);
                    if (record) {
                        const existing = idMap.get(record.studentId);
                        if (!existing || (file.name.endsWith('.docx') && existing.fileName.endsWith('.pdf'))) {
                            idMap.set(record.studentId, record);
                        }
                    }
                    processed++;
                    const percent = (processed / tcFiles.length) * 100;
                    progressFill.style.width = `${percent}%`;
                    fileStatus.textContent = `⏳ ${processed}/${tcFiles.length}`;
                } catch (e) {
                    console.error("Error processing file:", entry.name, e);
                }
            }
            
            const uniqueRecords = Array.from(idMap.values());
            
            const existingIds = new Set(allRecords.map(r => r.studentId));
            for (const rec of uniqueRecords) {
                if (!existingIds.has(rec.studentId)) {
                    allRecords.push(rec);
                    existingIds.add(rec.studentId);
                }
            }
            
            fileStatus.textContent = `✅ ${allRecords.length} records extracted from ${tcFiles.length} file(s)`;
            fileStatus.style.background = "#e6f5e6";
            renderReport(allRecords);
            
            autoScanBtn.disabled = false;
            isScanning = false;
            setTimeout(() => {
                progressFill.style.width = '0%';
            }, 1000);
        }

        // ---------- RENDER FUNCTION ----------
        function renderReport(formsArray) {
            reportList.innerHTML = '';

            if (!formsArray || formsArray.length === 0) {
                const notFoundDiv = document.createElement('div');
                notFoundDiv.className = 'not-found-message';
                
                const searchQuery = searchInput.value.trim();
                let formId = searchQuery;
                if (formId.match(/^\d{6,8}$/)) {
                    lastSearchedId = formId;
                } else if (lastSearchedId) {
                    formId = lastSearchedId;
                } else {
                    formId = "ID";
                }
                
                notFoundDiv.innerHTML = `
                    <i class="fas fa-file-alt" style="font-size: 1.5rem; display: block; margin-bottom: 8px; color: #b38b6d;"></i>
                    <strong style="font-style: normal; color: #2d1f14;">TC record not found</strong> 
                    for “${searchInput.value || 'this student'}”.
                    <div class="action-group">
                        <button class="action-btn download-btn" id="downloadTcBtn"><i class="fas fa-download"></i> Download Form (TC-${formId}.docx)</button>
                    </div>
                    <div style="margin-top: 6px; font-size: 0.75rem; color: #5c6f87; font-family: 'Segoe UI', Arial, sans-serif;">
                        <i class="fas fa-info-circle"></i> The form will be downloaded as "TC-${formId}.docx"
                    </div>
                `;
                reportList.appendChild(notFoundDiv);
                recordCount.textContent = `0 records`;
                
                document.getElementById('downloadTcBtn')?.addEventListener('click', function(e) {
                    e.stopPropagation();
                    downloadFormWithName(formId);
                });
                return;
            }

            // Sort by date from newest to oldest
            const sorted = [...formsArray].sort((a, b) => {
                const dateA = parseDate(a.date);
                const dateB = parseDate(b.date);
                return dateB - dateA;
            });

            const table = document.createElement('table');
            table.className = 'report-table';
            
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            const headers = ['S. No.', "Student's Name", 'ID Number', 'TC Date', 'Provider', 'File Name'];
            headers.forEach(text => {
                const th = document.createElement('th');
                th.textContent = text;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);
            
            const tbody = document.createElement('tbody');
            sorted.forEach((item, index) => {
                const tr = document.createElement('tr');
                
                const snoTd = document.createElement('td');
                snoTd.className = 'sno-col';
                snoTd.textContent = index + 1;
                tr.appendChild(snoTd);
                
                const nameTd = document.createElement('td');
                nameTd.textContent = item.studentName;
                tr.appendChild(nameTd);
                
                const idTd = document.createElement('td');
                idTd.textContent = item.studentId;
                tr.appendChild(idTd);
                
                const dateTd = document.createElement('td');
                dateTd.textContent = item.date;
                tr.appendChild(dateTd);
                
                const providerTd = document.createElement('td');
                providerTd.textContent = PROVIDER_NAME;
                tr.appendChild(providerTd);
                
                const fileTd = document.createElement('td');
                fileTd.className = 'file-name-col';
                const fileExt = item.fileName ? item.fileName.split('.').pop().toUpperCase() : '';
                fileTd.innerHTML = `${item.fileName || ''} <span class="file-type-badge">${fileExt}</span>`;
                tr.appendChild(fileTd);
                
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            reportList.appendChild(table);
            recordCount.textContent = `${sorted.length} record${sorted.length > 1 ? 's' : ''}`;
        }

        // ---------- SEARCH ----------
        function performSearch() {
            const query = searchInput.value.trim().toLowerCase();
            
            const idMatch = query.match(/\d{6,8}/);
            if (idMatch) {
                lastSearchedId = idMatch[0];
            }
            
            if (!query) {
                renderReport(allRecords);
                return;
            }
            const filtered = allRecords.filter(item => 
                item.studentName.toLowerCase().includes(query) || 
                item.studentId.includes(query)
            );
            renderReport(filtered);
        }

        // ---------- EVENT LISTENERS ----------
        autoScanBtn.addEventListener('click', scanFolderWithPermission);
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });

        renderReport([]);
    })();
</script>
</body>
</html>
